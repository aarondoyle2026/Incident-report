<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SuperValu Accident / Incident Report</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f5f5f5;
}

h2{
text-align:center;
margin-bottom:5px;
}

.section{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:6px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
font-size:16px;
box-sizing:border-box;
}

button{
background:#00703c;
color:white;
padding:15px;
width:100%;
font-size:18px;
border:none;
border-radius:5px;
margin-top:10px;
}

.small{
background:#666;
}

#signature-pad{
border:2px solid #ccc;
background:white;
width:100%;
height:200px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

</head>

<body>

<h2>Moriarty Group (SuperValu)<br>Accident / Incident Report</h2>


<div class="section">

<label>Store</label>
<input id="store">

<label>Manager</label>
<input id="manager">

<label>Phone</label>
<input id="phone">

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<input type="time" id="time">

</div>


<div class="section">

<h3>Particulars of Accident</h3>

<label>1. State day, date and time of accident</label>
<textarea id="q1"></textarea>

<label>2. To whom and when was it reported</label>
<textarea id="q2"></textarea>

<label>3. Who reported the accident</label>
<textarea id="q3"></textarea>

<label>4. Where precisely did it happen</label>
<textarea id="q4"></textarea>

<label>5. State fully what happened</label>
<textarea id="q5"></textarea>

<label>6. Cause of accident</label>
<textarea id="q6"></textarea>

<label>7. Condition of floor</label>
<textarea id="q7"></textarea>

<label>8. Weather conditions</label>
<textarea id="q8"></textarea>

</div>


<div class="section">

<h3>Witness</h3>

<label>Was the accident witnessed</label>
<input id="witnessed">

<label>Witness names / addresses</label>
<textarea id="witnessNames"></textarea>

</div>


<div class="section">

<h3>Who Was Present</h3>

<label>With injured party</label>
<textarea id="present1"></textarea>

<label>Our employees</label>
<textarea id="present2"></textarea>

<label>Others</label>
<textarea id="present3"></textarea>

</div>


<div class="section">

<h3>Injured Party</h3>

<label>Name / Address</label>
<textarea id="injured1"></textarea>

<label>Customer / Employee / Other</label>
<input id="injured2">

<label>Approx Age</label>
<input id="injured3">

<label>Footwear</label>
<textarea id="injured4"></textarea>

<label>Was injured party carrying anything</label>
<textarea id="injured5"></textarea>

<label>Nature of injuries observed</label>
<textarea id="injured6"></textarea>

</div>


<div class="section">

<h3>Treatment Given</h3>

<label>Treatment</label>
<textarea id="treatment"></textarea>

<label>Employee absent from work</label>
<textarea id="absence"></textarea>

<label>Paid in store expenses</label>
<textarea id="expenses"></textarea>

</div>


<div class="section">

<h3>Statement 1</h3>
<textarea id="statement1"></textarea>
<label>Statement Photo</label>
<input type="file" id="statement1photo" accept="image/*">

<h3>Statement 2</h3>
<textarea id="statement2"></textarea>
<label>Statement Photo</label>
<input type="file" id="statement2photo" accept="image/*">

<h3>Statement 3</h3>
<textarea id="statement3"></textarea>
<label>Statement Photo</label>
<input type="file" id="statement3photo" accept="image/*">

</div>


<div class="section">

<h3>Additional Photos</h3>

<input type="file" id="photo1" accept="image/*">
<input type="file" id="photo2" accept="image/*">
<input type="file" id="photo3" accept="image/*">

</div>


<div class="section">

<h3>Manager Signature</h3>

<canvas id="signature-pad"></canvas>

<button class="small" onclick="clearSignature()">Clear Signature</button>

</div>


<button onclick="generateReport()">Generate & Share Report</button>


<script>

let signaturePad;

window.onload=function(){

const canvas=document.getElementById("signature-pad");
canvas.width=canvas.offsetWidth;
canvas.height=200;

signaturePad=new SignaturePad(canvas);

}

function clearSignature(){
signaturePad.clear();
}


/* IMAGE COMPRESSION */

function compressImage(file){

return new Promise(resolve=>{

const reader=new FileReader();

reader.onload=function(e){

const img=new Image();

img.onload=function(){

const canvas=document.createElement("canvas");

const maxWidth=1200;

const scale=maxWidth/img.width;

canvas.width=maxWidth;
canvas.height=img.height*scale;

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

resolve(canvas.toDataURL("image/jpeg",0.6));

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

});

}


async function addPhoto(pdf,file,title){

if(!file) return;

const img=await compressImage(file);

pdf.addPage();

pdf.setFont("helvetica","bold");
pdf.text(title,20,20);
pdf.line(20,24,190,24);

pdf.addImage(img,'JPEG',15,30,180,220);

}



async function generateReport(){

const { jsPDF } = window.jspdf;

const pdf=new jsPDF();

pdf.setDrawColor(150);

pdf.setFont("helvetica","bold");
pdf.setFontSize(16);

pdf.text("MORIARTY GROUP (SUPERVALU)",20,18);

pdf.setFontSize(13);
pdf.text("ACCIDENT / INCIDENT REPORT FORM",20,26);

pdf.line(20,30,190,30);


pdf.setFont("helvetica","normal");
pdf.setFontSize(10);

let y=42;


function question(title,value){

pdf.text(title,20,y);

y+=6;

pdf.line(20,y,190,y);

if(value){
pdf.text(value,22,y-2);
}

y+=10;

}


pdf.text(`Store: ${store.value}`,20,y);
pdf.text(`Manager: ${manager.value}`,80,y);
pdf.text(`Phone: ${phone.value}`,140,y);

y+=8;

pdf.text(`Date: ${date.value}`,20,y);
pdf.text(`Time: ${time.value}`,80,y);

y+=12;


pdf.setFont("helvetica","bold");
pdf.text("PARTICULARS OF ACCIDENT",20,y);
pdf.line(20,y+2,190,y+2);

y+=6;

pdf.setFont("helvetica","normal");

question("1. State day, date and time of accident",q1.value);
question("2. To whom and when was it reported",q2.value);
question("3. Who reported the accident",q3.value);
question("4. Where precisely did it happen",q4.value);
question("5. State fully what happened",q5.value);
question("6. Cause of accident",q6.value);
question("7. Condition of floor",q7.value);
question("8. Weather conditions",q8.value);


question("Was accident witnessed",witnessed.value);
question("Witness names / addresses",witnessNames.value);


question("With injured party",present1.value);
question("Our employees",present2.value);
question("Others",present3.value);


question("Name / Address",injured1.value);
question("Customer / Employee / Other",injured2.value);
question("Approx age",injured3.value);
question("Footwear",injured4.value);
question("Carrying anything",injured5.value);
question("Nature of injuries",injured6.value);


question("Treatment",treatment.value);
question("Employee absence",absence.value);
question("Expenses",expenses.value);


if(!signaturePad.isEmpty()){

const sig=signaturePad.toDataURL();

y+=8;

pdf.text("Manager Signature",20,y);

pdf.line(20,y+4,100,y+4);

pdf.addImage(sig,'PNG',22,y-18,60,20);

}


await addPhoto(pdf,statement1photo.files[0],"Statement 1 Photo");
await addPhoto(pdf,statement2photo.files[0],"Statement 2 Photo");
await addPhoto(pdf,statement3photo.files[0],"Statement 3 Photo");

await addPhoto(pdf,photo1.files[0],"Additional Photo 1");
await addPhoto(pdf,photo2.files[0],"Additional Photo 2");
await addPhoto(pdf,photo3.files[0],"Additional Photo 3");


const blob=pdf.output("blob");

const file=new File([blob],"Incident_Report.pdf",{type:"application/pdf"});

if(navigator.share){

navigator.share({
title:"SuperValu Incident Report",
files:[file]
});

}else{

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="Incident_Report.pdf";

link.click();

}

}

</script>

</body>
</html>
