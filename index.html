<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SuperValu Accident / Incident Report</title>

<style>
body {font-family: Arial; margin:20px; background:#f5f5f5;}
h2 {text-align:center;}
label {font-weight:bold;}
input, textarea {width:100%; padding:10px; margin-top:5px; margin-bottom:15px; font-size:16px;}
.section {background:white;padding:15px;margin-bottom:15px;border-radius:6px;}
button {background:#00703c;color:white;padding:15px;width:100%;font-size:18px;border:none;border-radius:5px;margin-top:10px;}
#signature-pad {border:2px solid #ccc;background:white;width:100%;height:200px;}
.small {background:#666;}
</style>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

</head>

<body>

<h2>Moriarty Group (SuperValu)<br>Accident / Incident Report</h2>

<div class="section">

<label>Store</label>
<input id="store">

<label>Manager</label>
<input id="manager">

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<input type="time" id="time">

</div>

<div class="section">

<label>Exact location in store</label>
<input id="location">

<label>Description of incident</label>
<textarea id="description"></textarea>

<label>Cause of accident</label>
<textarea id="cause"></textarea>

</div>

<div class="section">

<h3>Witness Statements</h3>

<label>Witness 1</label>
<textarea id="witness1"></textarea>

<label>Witness 2</label>
<textarea id="witness2"></textarea>

<label>Witness 3</label>
<textarea id="witness3"></textarea>

</div>

<div class="section">

<h3>Evidence</h3>

<label>Scene Photo</label>
<input type="file" id="photo1" accept="image/*" capture="environment">

<label>Additional Photos</label>
<input type="file" id="photo2" accept="image/*" multiple>

<label>Video Clip</label>
<input type="file" id="video" accept="video/*">

</div>

<div class="section">

<h3>Manager Signature</h3>

<canvas id="signature-pad"></canvas>

<button class="small" onclick="clearSignature()">Clear Signature</button>

</div>

<button onclick="generateReport()">Generate & Email Report</button>

<script>

let signaturePad;

window.onload = function(){

const canvas = document.getElementById("signature-pad");

canvas.width = canvas.offsetWidth;
canvas.height = 200;

signaturePad = new SignaturePad(canvas);

}

function clearSignature(){
signaturePad.clear();
}

function readImage(file){

return new Promise(resolve=>{
let reader = new FileReader();
reader.onload = e => resolve(e.target.result);
reader.readAsDataURL(file);
})

}

async function generateReport(){

const { jsPDF } = window.jspdf;

let pdf = new jsPDF();

let store = document.getElementById("store").value;
let manager = document.getElementById("manager").value;
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;
let location = document.getElementById("location").value;
let description = document.getElementById("description").value;
let cause = document.getElementById("cause").value;

let witness1 = document.getElementById("witness1").value;
let witness2 = document.getElementById("witness2").value;
let witness3 = document.getElementById("witness3").value;

let y = 20;

pdf.setFontSize(18);
pdf.text("SuperValu Accident / Incident Report",20,y);

y+=15;

pdf.setFontSize(12);

pdf.text(`Store: ${store}`,20,y); y+=10;
pdf.text(`Manager: ${manager}`,20,y); y+=10;
pdf.text(`Date: ${date}`,20,y); y+=10;
pdf.text(`Time: ${time}`,20,y); y+=10;
pdf.text(`Location: ${location}`,20,y); y+=15;

pdf.text("Description:",20,y); y+=10;
pdf.text(pdf.splitTextToSize(description,170),20,y); y+=20;

pdf.text("Cause:",20,y); y+=10;
pdf.text(pdf.splitTextToSize(cause,170),20,y); y+=20;

pdf.text("Witness Statements:",20,y); y+=10;

pdf.text("Witness 1:",20,y); y+=8;
pdf.text(pdf.splitTextToSize(witness1,170),20,y); y+=15;

pdf.text("Witness 2:",20,y); y+=8;
pdf.text(pdf.splitTextToSize(witness2,170),20,y); y+=15;

pdf.text("Witness 3:",20,y); y+=8;
pdf.text(pdf.splitTextToSize(witness3,170),20,y); y+=15;

if(!signaturePad.isEmpty()){

let sig = signaturePad.toDataURL();

pdf.text("Manager Signature:",20,y);
pdf.addImage(sig,'PNG',20,y+5,60,30);

y+=40;

}

let photo1 = document.getElementById("photo1").files[0];
let photo2 = document.getElementById("photo2").files;

if(photo1){

let img = await readImage(photo1);

pdf.addPage();
pdf.text("Scene Photo",20,20);
pdf.addImage(img,'JPEG',20,30,170,120);

}

for(let i=0;i<photo2.length;i++){

let img = await readImage(photo2[i]);

pdf.addPage();
pdf.text("Additional Photo",20,20);
pdf.addImage(img,'JPEG',20,30,170,120);

}

let video = document.getElementById("video").files[0];

if(video){

pdf.addPage();
pdf.text("Video Evidence Recorded",20,20);
pdf.text(video.name,20,40);

}

let blob = pdf.output("blob");

let file = new File([blob],"Incident_Report.pdf",{type:"application/pdf"});

if(navigator.share){

navigator.share({
title:"SuperValu Incident Report",
files:[file]
});

}else{

let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="Incident_Report.pdf";
link.click();

}

}

</script>

</body>
</html>
