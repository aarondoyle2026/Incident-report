<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moriarty Group (SuperValu) Accident / Incident Report</title>

<style>
body{font-family:Arial,sans-serif;margin:20px;background:#f5f5f5;color:#111;}
h2{text-align:center;margin-bottom:18px;}
h3{margin:0 0 10px 0;}
label{font-weight:bold;display:block;margin-top:10px;}
input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:10px;
  font-size:16px;
  box-sizing:border-box;
}
textarea{min-height:80px;}
.section{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:6px;
  border:1px solid #ddd;
}
button{
  background:#00703c;
  color:#fff;
  padding:15px;
  width:100%;
  font-size:18px;
  border:none;
  border-radius:5px;
  margin-top:10px;
}
.small{background:#666;}
.inline3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.inline2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.checkrow{display:flex;gap:15px;flex-wrap:wrap;margin:8px 0 14px 0;}
.checkrow label{font-weight:normal;display:flex;align-items:center;gap:6px;margin:0;}
.checkrow input{width:auto;margin:0;}
#signature-pad{border:2px solid #ccc;background:#fff;width:100%;height:200px;touch-action:none;}
@media (max-width:700px){
  .inline3,.inline2{grid-template-columns:1fr;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

<h2>Moriarty Group (SuperValu)<br>Accident / Incident Report Form</h2>

<div class="section">
  <h3>Store Details</h3>

  <label>Store</label>
  <input id="store">

  <label>Manager</label>
  <input id="manager">

  <label>Phone Number</label>
  <input id="phone">

  <div class="inline2">
    <div>
      <label>Date</label>
      <input type="date" id="date">
    </div>
    <div>
      <label>Time</label>
      <input type="time" id="time">
    </div>
  </div>
</div>

<div class="section">
  <h3>Particulars of Accident</h3>

  <label>1. State day / date / time of accident</label>
  <textarea id="accident_datetime"></textarea>

  <label>2. To whom and when was it reported</label>
  <textarea id="reported_to_when"></textarea>

  <label>3. Who reported the accident</label>
  <textarea id="reported_by"></textarea>

  <label>4. Where precisely did it happen</label>
  <textarea id="location"></textarea>

  <label>5. State fully what happened</label>
  <textarea id="description"></textarea>

  <label>6. Cause of accident</label>
  <textarea id="cause"></textarea>

  <label>7. Condition of floor</label>
  <textarea id="floor_condition"></textarea>

  <div class="checkrow">
    <label><input type="checkbox" id="floor_dry"> Dry</label>
    <label><input type="checkbox" id="floor_wet"> Wet</label>
    <label><input type="checkbox" id="floor_other"> Other</label>
  </div>

  <label>8. Weather conditions</label>
  <textarea id="weather"></textarea>
</div>

<div class="section">
  <h3>Witnesses</h3>

  <div class="checkrow">
    <label><input type="checkbox" id="witnessed_yes"> Accident witnessed - Yes</label>
    <label><input type="checkbox" id="witnessed_no"> Accident witnessed - No</label>
  </div>

  <label>Witness Names</label>
  <textarea id="witness_names"></textarea>

  <label>Witness 1 Statement</label>
  <textarea id="w1"></textarea>
  <label>Witness 1 Photo</label>
  <input type="file" id="w1p" accept="image/*">

  <label>Witness 2 Statement</label>
  <textarea id="w2"></textarea>
  <label>Witness 2 Photo</label>
  <input type="file" id="w2p" accept="image/*">

  <label>Witness 3 Statement</label>
  <textarea id="w3"></textarea>
  <label>Witness 3 Photo</label>
  <input type="file" id="w3p" accept="image/*">
</div>

<div class="section">
  <h3>Who Was Present</h3>

  <label>With Injured Party</label>
  <textarea id="with_injured"></textarea>

  <label>Our Employees</label>
  <textarea id="employees_present"></textarea>

  <label>Others</label>
  <textarea id="others_present"></textarea>
</div>

<div class="section">
  <h3>Injured Party</h3>

  <label>Name / Address</label>
  <textarea id="injured_name_address"></textarea>

  <label>Approx Age</label>
  <input id="injured_age">

  <div class="checkrow">
    <label><input type="checkbox" id="injured_customer"> Customer</label>
    <label><input type="checkbox" id="injured_employee"> Employee</label>
    <label><input type="checkbox" id="injured_other"> Other</label>
  </div>

  <label>Footwear</label>
  <textarea id="footwear"></textarea>

  <label>Was the injured party carrying anything</label>
  <textarea id="carrying"></textarea>

  <label>Nature of injuries observed</label>
  <textarea id="injuries"></textarea>
</div>

<div class="section">
  <h3>Treatment Given</h3>

  <div class="checkrow">
    <label><input type="checkbox" id="treatment_none"> None</label>
    <label><input type="checkbox" id="treatment_firstaid"> First Aid</label>
    <label><input type="checkbox" id="treatment_doctor"> Doctor</label>
    <label><input type="checkbox" id="treatment_casualty"> Brought to casualty</label>
    <label><input type="checkbox" id="treatment_ambulance"> Ambulance</label>
  </div>

  <label>Treatment Details</label>
  <textarea id="treatment_details"></textarea>
</div>

<div class="section">
  <h3>Employee Accident</h3>

  <div class="checkrow">
    <label><input type="checkbox" id="absent_yes"> Was employee absent from work - Yes</label>
    <label><input type="checkbox" id="absent_no"> Was employee absent from work - No</label>
  </div>

  <label>If yes, state period</label>
  <textarea id="absence_period"></textarea>
</div>

<div class="section">
  <h3>Paid In Store Expenses</h3>

  <label>Amount (€)</label>
  <input id="expenses_amount">

  <label>Details</label>
  <textarea id="expenses_details"></textarea>
</div>

<div class="section">
  <h3>Evidence Photos</h3>

  <label>Scene Photo 1</label>
  <input type="file" id="scene1" accept="image/*" capture="environment">

  <label>Scene Photo 2</label>
  <input type="file" id="scene2" accept="image/*" capture="environment">

  <label>Scene Photo 3</label>
  <input type="file" id="scene3" accept="image/*" capture="environment">

  <label>Additional Photo 1</label>
  <input type="file" id="add1" accept="image/*">

  <label>Additional Photo 2</label>
  <input type="file" id="add2" accept="image/*">

  <label>Additional Photo 3</label>
  <input type="file" id="add3" accept="image/*">
</div>

<div class="section">
  <h3>Video Evidence</h3>

  <label>Video Clip 1</label>
  <input type="file" id="v1" accept="video/*">

  <label>Video Clip 2</label>
  <input type="file" id="v2" accept="video/*">

  <label>Video Clip 3</label>
  <input type="file" id="v3" accept="video/*">
</div>

<div class="section">
  <h3>Completion</h3>

  <label>Completed By</label>
  <input id="completed_by">

  <label>Completion Date</label>
  <input type="date" id="completed_date">

  <label>Store Manager</label>
  <input id="store_manager_name">

  <label>Store Manager Signature</label>
  <canvas id="signature-pad"></canvas>

  <button class="small" onclick="clearSignature()">Clear Signature</button>
</div>

<button onclick="generateReport()">Generate & Email Report</button>

<script>
let signaturePad;

window.onload = function () {
  const canvas = document.getElementById("signature-pad");
  canvas.width = canvas.offsetWidth;
  canvas.height = 200;
  signaturePad = new SignaturePad(canvas);
};

function clearSignature(){
  signaturePad.clear();
}

function yesNoFromChecks(yesId, noId){
  const yes = document.getElementById(yesId).checked;
  const no = document.getElementById(noId).checked;
  if(yes && !no) return "Yes";
  if(no && !yes) return "No";
  if(yes && no) return "Yes / No both ticked";
  return "";
}

function tickList(idsAndLabels){
  return idsAndLabels
    .filter(item => document.getElementById(item.id).checked)
    .map(item => item.label)
    .join(", ");
}

function safeText(id){
  const el = document.getElementById(id);
  return el ? (el.value || "") : "";
}

function addWrappedText(pdf, text, x, y, width, lineHeight){
  const lines = pdf.splitTextToSize(text || "", width);
  pdf.text(lines, x, y);
  return y + (lines.length * lineHeight);
}

function ensureSpace(pdf, y, needed){
  if(y + needed > 270){
    pdf.addPage();
    return 20;
  }
  return y;
}

function readImage(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        const canvas = document.createElement("canvas");
        const maxWidth = 1000;
        const scale = Math.min(1, maxWidth / img.width);
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.55));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function addPhotoPage(pdf, file, title){
  if(!file) return;
  const img = await readImage(file);

  pdf.addPage();
  pdf.setFont("helvetica","bold");
  pdf.setFontSize(16);
  pdf.text(title,20,20);
  pdf.line(20,24,190,24);

  pdf.addImage(img,'JPEG',15,30,180,130);
}

async function addWitnessSection(pdf, title, statementText, photoFile){
  if(statementText && statementText.trim()){
    pdf.addPage();
    pdf.setFont("helvetica","bold");
    pdf.setFontSize(16);
    pdf.text(title,20,20);
    pdf.line(20,24,190,24);

    pdf.setFont("helvetica","normal");
    pdf.setFontSize(12);
    addWrappedText(pdf, statementText, 20, 40, 170, 7);
  }

  await addPhotoPage(pdf, photoFile, title.replace("Statement","Photo"));
}

async function generateReport(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const store = safeText("store");
  const manager = safeText("manager");
  const phone = safeText("phone");
  const date = safeText("date");
  const time = safeText("time");

  const accident_datetime = safeText("accident_datetime");
  const reported_to_when = safeText("reported_to_when");
  const reported_by = safeText("reported_by");
  const location = safeText("location");
  const description = safeText("description");
  const cause = safeText("cause");
  const floor_condition = safeText("floor_condition");
  const weather = safeText("weather");

  const witness_names = safeText("witness_names");
  const w1 = safeText("w1");
  const w2 = safeText("w2");
  const w3 = safeText("w3");

  const with_injured = safeText("with_injured");
  const employees_present = safeText("employees_present");
  const others_present = safeText("others_present");

  const injured_name_address = safeText("injured_name_address");
  const injured_age = safeText("injured_age");
  const footwear = safeText("footwear");
  const carrying = safeText("carrying");
  const injuries = safeText("injuries");

  const treatment_details = safeText("treatment_details");
  const absence_period = safeText("absence_period");
  const expenses_amount = safeText("expenses_amount");
  const expenses_details = safeText("expenses_details");

  const completed_by = safeText("completed_by");
  const completed_date = safeText("completed_date");
  const store_manager_name = safeText("store_manager_name");

  const floorTicks = tickList([
    {id:"floor_dry",label:"Dry"},
    {id:"floor_wet",label:"Wet"},
    {id:"floor_other",label:"Other"}
  ]);

  const injuredType = tickList([
    {id:"injured_customer",label:"Customer"},
    {id:"injured_employee",label:"Employee"},
    {id:"injured_other",label:"Other"}
  ]);

  const treatmentTicks = tickList([
    {id:"treatment_none",label:"None"},
    {id:"treatment_firstaid",label:"First Aid"},
    {id:"treatment_doctor",label:"Doctor"},
    {id:"treatment_casualty",label:"Brought to casualty"},
    {id:"treatment_ambulance",label:"Ambulance"}
  ]);

  const witnessed = yesNoFromChecks("witnessed_yes","witnessed_no");
  const absent = yesNoFromChecks("absent_yes","absent_no");

  pdf.setFont("helvetica","bold");
  pdf.setFontSize(18);
  pdf.text("MORIARTY GROUP (SUPERVALU)",20,18);
  pdf.setFontSize(15);
  pdf.text("ACCIDENT / INCIDENT REPORT FORM",20,28);
  pdf.line(20,32,190,32);

  pdf.setFont("helvetica","normal");
  pdf.setFontSize(11);

  let y = 42;

  pdf.setFont("helvetica","bold");
  pdf.text("STORE DETAILS",20,y);
  pdf.line(20,y+2,190,y+2);
  y += 10;

  pdf.setFont("helvetica","normal");
  pdf.text(`Store: ${store}`,20,y); y += 8;
  pdf.text(`Manager: ${manager}`,20,y); y += 8;
  pdf.text(`Phone No: ${phone}`,20,y); y += 8;
  pdf.text(`Date: ${date}`,20,y); y += 8;
  pdf.text(`Time: ${time}`,20,y); y += 12;

  y = ensureSpace(pdf,y,90);
  pdf.setFont("helvetica","bold");
  pdf.text("PARTICULARS OF ACCIDENT",20,y);
  pdf.line(20,y+2,190,y+2);
  y += 10;

  pdf.setFont("helvetica","normal");

  pdf.text("1. State day / date / time of accident",20,y); y += 7;
  y = addWrappedText(pdf, accident_datetime, 20, y, 170, 6) + 6;

  pdf.text("2. To whom and when was it reported",20,y); y += 7;
  y = addWrappedText(pdf, reported_to_when, 20, y, 170, 6) + 6;

  pdf.text("3. Who reported the accident",20,y); y += 7;
  y = addWrappedText(pdf, reported_by, 20, y, 170, 6) + 6;

  pdf.text("4. Where precisely did it happen",20,y); y += 7;
  y = addWrappedText(pdf, location, 20, y, 170, 6) + 6;

  pdf.text("5. State fully what happened",20,y); y += 7;
  y = addWrappedText(pdf, description, 20, y, 170, 6) + 6;

  y = ensureSpace(pdf,y,55);
  pdf.text("6. Cause of accident",20,y); y += 7;
  y = addWrappedText(pdf, cause, 20, y, 170, 6) + 6;

  pdf.text("7. Condition of floor",20,y); y += 7;
  y = addWrappedText(pdf, floor_condition, 20, y, 170, 6) + 4;
  if(floorTicks){
    pdf.text(`Ticked: ${floorTicks}`,20,y);
    y += 10;
  }

  pdf.text("8. Weather conditions",20,y); y += 7;
  y = addWrappedText(pdf, weather, 20, y, 170, 6) + 8;

  y = ensureSpace(pdf,y,70);
  pdf.setFont("helvetica","bold");
  pdf.text("WITNESSES",20,y);
  pdf.line(20,y+2,190,y+2);
  y += 10;
  pdf.setFont("helvetica","normal");

  pdf.text(`Accident witnessed: ${witnessed}`,20,y); y += 8;
  pdf.text("Witness names",20,y); y += 7;
  y = addWrappedText(pdf, witness_names, 20, y, 170, 6) + 8;

  y = ensureSpace(pdf,y,60);
  pdf.setFont("helvetica","bold");
  pdf.text("WHO WAS PRESENT",20,y);
  pdf.line(20,y+2,190,y+2);
  y += 10;
  pdf.setFont("helvetica","normal");

  pdf.text("With injured party",20,y); y += 7;
  y = addWrappedText(pdf, with_injured, 20, y, 170, 6) + 6;

  pdf.text("Our employees",20,y); y += 7;
  y = addWrappedText(pdf, employees_present, 20, y, 170, 6) + 6;

  pdf.text("Others",20,y); y += 7;
  y = addWrappedText(pdf, others_present, 20, y, 170, 6) + 8;

  y = ensureSpace(pdf,y,85);
  pdf.setFont("helvetica","bold");
  pdf.text("INJURED PARTY",20,y);
  pdf.line(20,y+2,190,y+2);
  y += 10;
  pdf.setFont("helvetica","normal");

  pdf.text("Name / Address",20,y); y += 7;
  y = addWrappedText(pdf, injured_name_address, 20, y, 170, 6) + 6;

  pdf.text(`Approx Age: ${injured_age}`,20,y); y += 8;
  pdf.text(`Customer / Employee / Other: ${injuredType}`,20,y); y += 8;

  pdf.text("Footwear",20,y); y += 7;
  y = addWrappedText(pdf, footwear, 20, y, 170, 6) + 6;

  pdf.text("Was the injured party carrying anything",20,y); y += 7;
  y = addWrappedText(pdf, carrying, 20, y, 170, 6) + 6;

  pdf.text("Nature of injuries observed",20,y); y += 7;
  y = addWrappedText(pdf, injuries, 20, y, 170, 6) + 8;

  y = ensureSpace(pdf,y,70);
  pdf.setFont("helvetica","bold");
  pdf.text("TREATMENT GIVEN",20,y);
  pdf.line(20,y+2,190,y+2);
  y += 10;
  pdf.setFont("helvetica","normal");

  pdf.text(`Treatment selected: ${treatmentTicks}`,20,y); y += 8;
  pdf.text("Treatment details",20,y); y += 7;
  y = addWrappedText(pdf, treatment_details, 20, y, 170, 6) + 8;

  y = ensureSpace(pdf,y,55);
  pdf.setFont("helvetica","bold");
  pdf.text("EMPLOYEE ACCIDENT",20,y);
  pdf.line(20,y+2,190,y+2);
  y += 10;
  pdf.setFont("helvetica","normal");

  pdf.text(`Was employee absent from work: ${absent}`,20,y); y += 8;
  pdf.text("If yes, state period",20,y); y += 7;
  y = addWrappedText(pdf, absence_period, 20, y, 170, 6) + 8;

  y = ensureSpace(pdf,y,55);
  pdf.setFont("helvetica","bold");
  pdf.text("PAID IN STORE EXPENSES",20,y);
  pdf.line(20,y+2,190,y+2);
  y += 10;
  pdf.setFont("helvetica","normal");

  pdf.text(`Amount (€): ${expenses_amount}`,20,y); y += 8;
  pdf.text("Details",20,y); y += 7;
  y = addWrappedText(pdf, expenses_details, 20, y, 170, 6) + 8;

  y = ensureSpace(pdf,y,70);
  pdf.setFont("helvetica","bold");
  pdf.text("COMPLETION",20,y);
  pdf.line(20,y+2,190,y+2);
  y += 10;
  pdf.setFont("helvetica","normal");

  pdf.text(`Completed by: ${completed_by}`,20,y); y += 8;
  pdf.text(`Date: ${completed_date}`,20,y); y += 8;
  pdf.text(`Store Manager: ${store_manager_name}`,20,y); y += 12;

  if(!signaturePad.isEmpty()){
    const sig = signaturePad.toDataURL();
    pdf.setFont("helvetica","bold");
    pdf.text("Store Manager Signature",20,y);
    pdf.addImage(sig,'PNG',20,y+5,60,30);
  }

  await addWitnessSection(pdf, "Witness 1 Statement", w1, document.getElementById("w1p").files[0]);
  await addWitnessSection(pdf, "Witness 2 Statement", w2, document.getElementById("w2p").files[0]);
  await addWitnessSection(pdf, "Witness 3 Statement", w3, document.getElementById("w3p").files[0]);

  await addPhotoPage(pdf, document.getElementById("scene1").files[0], "Scene Photo 1");
  await addPhotoPage(pdf, document.getElementById("scene2").files[0], "Scene Photo 2");
  await addPhotoPage(pdf, document.getElementById("scene3").files[0], "Scene Photo 3");

  await addPhotoPage(pdf, document.getElementById("add1").files[0], "Additional Photo 1");
  await addPhotoPage(pdf, document.getElementById("add2").files[0], "Additional Photo 2");
  await addPhotoPage(pdf, document.getElementById("add3").files[0], "Additional Photo 3");

  const v1 = document.getElementById("v1").files[0];
  const v2 = document.getElementById("v2").files[0];
  const v3 = document.getElementById("v3").files[0];

  if(v1 || v2 || v3){
    pdf.addPage();
    pdf.setFont("helvetica","bold");
    pdf.setFontSize(16);
    pdf.text("VIDEO EVIDENCE RECORDED",20,20);
    pdf.line(20,24,190,24);

    pdf.setFont("helvetica","normal");
    pdf.setFontSize(12);
    let vy = 40;

    if(v1){ pdf.text("Video 1: " + v1.name,20,vy); vy += 10; }
    if(v2){ pdf.text("Video 2: " + v2.name,20,vy); vy += 10; }
    if(v3){ pdf.text("Video 3: " + v3.name,20,vy); vy += 10; }
  }

  const blob = pdf.output("blob");
  const filename = `SV_${store || "Report"}_${date || "NoDate"}.pdf`;
  const file = new File([blob], filename, {type:"application/pdf"});

  if(navigator.share){
    navigator.share({
      title:"SuperValu Incident Report",
      files:[file]
    });
  }else{
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
  }
}
</script>

</body>
</html>
