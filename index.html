<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SuperValu Accident / Incident Report</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f5f5f5;
}

h2{
text-align:center;
margin-bottom:5px;
}

h3{
margin-top:0;
}

.headerLine{
border-bottom:2px solid #000;
margin-bottom:20px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
font-size:16px;
box-sizing:border-box;
}

.section{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ddd;
}

button{
background:#00703c;
color:white;
padding:15px;
width:100%;
font-size:18px;
border:none;
border-radius:5px;
margin-top:10px;
}

.small{
background:#666;
}

#signature-pad{
border:2px solid #ccc;
background:white;
width:100%;
height:200px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

</head>

<body>

<h2>Moriarty Group (SuperValu)</h2>
<h3 style="text-align:center;">ACCIDENT / INCIDENT REPORT FORM</h3>
<div class="headerLine"></div>


<div class="section">

<label>Store</label>
<input id="store">

<label>Manager</label>
<input id="manager">

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<input type="time" id="time">

</div>


<div class="section">

<h3>Particulars of Accident</h3>

<label>Exact location in store</label>
<input id="location">

<label>Description of incident</label>
<textarea id="description"></textarea>

<label>Cause of accident</label>
<textarea id="cause"></textarea>

</div>


<div class="section">

<h3>Evidence Photos</h3>

<label>Scene photo</label>
<input type="file" id="scenePhoto" accept="image/*" capture="environment">

<label>Hazard photo</label>
<input type="file" id="hazardPhoto" accept="image/*">

<label>Product / shelf photo</label>
<input type="file" id="productPhoto" accept="image/*">

<label>Injury photo</label>
<input type="file" id="injuryPhoto" accept="image/*">

<label>Additional photos</label>
<input type="file" id="additionalPhotos" accept="image/*" multiple>

</div>


<div class="section">

<h3>Witness Statements</h3>

<label>Witness 1 statement</label>
<textarea id="w1"></textarea>
<input type="file" id="w1p" accept="image/*">

<label>Witness 2 statement</label>
<textarea id="w2"></textarea>
<input type="file" id="w2p" accept="image/*">

<label>Witness 3 statement</label>
<textarea id="w3"></textarea>
<input type="file" id="w3p" accept="image/*">

</div>


<div class="section">

<h3>Manager Section</h3>

<label>Manager name</label>
<input id="managerName">

<label>Treatment given</label>
<textarea id="treatment"></textarea>

<label>Manager Signature</label>
<canvas id="signature-pad"></canvas>

<button class="small" onclick="clearSignature()">Clear Signature</button>

</div>


<button onclick="generateReport()">Generate & Share Report</button>


<script>

let signaturePad;

window.onload=function(){

const canvas=document.getElementById("signature-pad");

canvas.width=canvas.offsetWidth;
canvas.height=200;

signaturePad=new SignaturePad(canvas);

}


function clearSignature(){
signaturePad.clear();
}


/* IMAGE COMPRESSION */

function compressImage(file){

return new Promise(resolve=>{

const reader=new FileReader();

reader.onload=function(e){

const img=new Image();

img.onload=function(){

const canvas=document.createElement("canvas");

const maxWidth=1200;

const scale=maxWidth/img.width;

canvas.width=maxWidth;
canvas.height=img.height*scale;

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

resolve(canvas.toDataURL("image/jpeg",0.6));

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

});

}


/* ADD PHOTO PAGE */

async function addPhotoPage(pdf,file,title){

if(!file) return;

const img=await compressImage(file);

pdf.addPage();

pdf.setFont("helvetica","bold");
pdf.setFontSize(14);

pdf.text(title,20,20);

pdf.line(20,24,190,24);

pdf.addImage(img,'JPEG',10,30,190,250);

}


/* GENERATE PDF */

async function generateReport(){

const { jsPDF } = window.jspdf;

const pdf=new jsPDF();

const store=document.getElementById("store").value;
const manager=document.getElementById("manager").value;
const date=document.getElementById("date").value;
const time=document.getElementById("time").value;
const location=document.getElementById("location").value;
const description=document.getElementById("description").value;
const cause=document.getElementById("cause").value;

pdf.setFont("helvetica","bold");
pdf.setFontSize(14);

pdf.text("MORIARTY GROUP (SUPERVALU)",20,20);

pdf.setFontSize(12);
pdf.text("ACCIDENT / INCIDENT REPORT FORM",20,28);

pdf.line(20,32,190,32);

pdf.setFontSize(10);
pdf.setFont("helvetica","normal");

let y=42;

pdf.text(`Store: ${store}`,20,y); y+=6;
pdf.text(`Manager: ${manager}`,20,y); y+=6;
pdf.text(`Date: ${date}`,20,y); y+=6;
pdf.text(`Time: ${time}`,20,y); y+=10;

pdf.setFont("helvetica","bold");
pdf.text("PARTICULARS OF ACCIDENT",20,y);
pdf.line(20,y+2,190,y+2);
y+=8;

pdf.setFont("helvetica","normal");

pdf.text("Location",20,y); y+=5;
pdf.text(pdf.splitTextToSize(location,170),20,y); y+=10;

pdf.text("Description",20,y); y+=5;
pdf.text(pdf.splitTextToSize(description,170),20,y); y+=10;

pdf.text("Cause",20,y); y+=5;
pdf.text(pdf.splitTextToSize(cause,170),20,y); y+=10;


if(!signaturePad.isEmpty()){

const sig=signaturePad.toDataURL();

pdf.addPage();

pdf.text("Manager Signature",20,20);

pdf.addImage(sig,'PNG',20,30,60,30);

}


/* WITNESS SECTIONS */

await addPhotoPage(pdf,document.getElementById("w1p").files[0],"Witness 1 Statement Photo");
await addPhotoPage(pdf,document.getElementById("w2p").files[0],"Witness 2 Statement Photo");
await addPhotoPage(pdf,document.getElementById("w3p").files[0],"Witness 3 Statement Photo");


/* SCENE PHOTOS */

await addPhotoPage(pdf,document.getElementById("scenePhoto").files[0],"Scene Photo");
await addPhotoPage(pdf,document.getElementById("hazardPhoto").files[0],"Hazard Photo");
await addPhotoPage(pdf,document.getElementById("productPhoto").files[0],"Product / Shelf Photo");
await addPhotoPage(pdf,document.getElementById("injuryPhoto").files[0],"Injury Photo");


const additional=document.getElementById("additionalPhotos").files;

for(let i=0;i<additional.length;i++){

await addPhotoPage(pdf,additional[i],"Additional Photo");

}


/* EXPORT */

const blob=pdf.output("blob");

const file=new File([blob],"Incident_Report.pdf",{type:"application/pdf"});

if(navigator.share){

navigator.share({
title:"SuperValu Incident Report",
files:[file]
});

}else{

const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="Incident_Report.pdf";

link.click();

}

}

</script>

</body>
</html>
