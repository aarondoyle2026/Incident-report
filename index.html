<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SuperValu Accident / Incident Report</title>

<style>
body {font-family: Arial; margin:20px; background:#f5f5f5;}
h2 {text-align:center;}
label {font-weight:bold;}
input, textarea {width:100%; padding:10px; margin-top:5px; margin-bottom:15px; font-size:16px;}
.section {background:white;padding:15px;margin-bottom:15px;border-radius:6px;}
button {background:#00703c;color:white;padding:15px;width:100%;font-size:18px;border:none;border-radius:5px;margin-top:10px;}
#signature-pad {border:2px solid #ccc;border-radius:4px;background:white;}
.small {background:#666;}
</style>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

</head>

<body>

<h2>Moriarty Group (SuperValu)<br>Accident / Incident Report</h2>

<div class="section">
<label>Store</label>
<input id="store">

<label>Manager</label>
<input id="manager">

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<input type="time" id="time">
</div>

<div class="section">
<label>Exact location in store</label>
<input id="location">

<label>Description of incident</label>
<textarea id="description"></textarea>

<label>Cause of accident</label>
<textarea id="cause"></textarea>
</div>

<div class="section">

<h3>Evidence Photos</h3>

<label>Scene photo</label>
<input type="file" id="photo1" accept="image/*" capture="environment">

<label>Additional photos</label>
<input type="file" id="photo2" accept="image/*" multiple>

</div>

<div class="section">

<h3>Manager Signature</h3>

<canvas id="signature-pad" width="300" height="200"></canvas>

<button class="small" onclick="clearSignature()">Clear Signature</button>

</div>

<button onclick="generateReport()">Generate & Email Report</button>

<script>

let signaturePad;

window.onload = function(){

const canvas = document.getElementById("signature-pad");

signaturePad = new SignaturePad(canvas);

}

function clearSignature(){
signaturePad.clear();
}

async function generateReport(){

const { jsPDF } = window.jspdf;

let store = document.getElementById("store").value;
let manager = document.getElementById("manager").value;
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;
let location = document.getElementById("location").value;
let description = document.getElementById("description").value;
let cause = document.getElementById("cause").value;

let pdf = new jsPDF();

pdf.setFontSize(16);

pdf.text("Moriarty Group (SuperValu)",20,20);
pdf.text("Accident / Incident Report",20,30);

pdf.setFontSize(12);

pdf.text(`Store: ${store}`,20,50);
pdf.text(`Manager: ${manager}`,20,60);
pdf.text(`Date: ${date}`,20,70);
pdf.text(`Time: ${time}`,20,80);

pdf.text(`Location: ${location}`,20,100);

pdf.text("Description:",20,120);
pdf.text(description,20,130);

pdf.text("Cause:",20,160);
pdf.text(cause,20,170);

if(!signaturePad.isEmpty()){

let signature = signaturePad.toDataURL();

pdf.text("Manager Signature:",20,200);

pdf.addImage(signature,'PNG',20,210,60,30);

}

let pdfBlob = pdf.output("blob");

let file = new File([pdfBlob],"Incident_Report.pdf",{type:"application/pdf"});

if(navigator.share){

navigator.share({

title:"SuperValu Incident Report",
files:[file]

});

}else{

let link = document.createElement("a");

link.href = URL.createObjectURL(pdfBlob);

link.download = "Incident_Report.pdf";

link.click();

}

}

</script>

</body>
</html>
