<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SuperValu Accident / Incident Report</title>

<style>
body {font-family: Arial; margin:20px; background:#f5f5f5;}
h2 {text-align:center;}
label {font-weight:bold;}
input, textarea, select {width:100%; padding:10px; margin-top:5px; margin-bottom:15px; font-size:16px;}
.section {background:white;padding:15px;margin-bottom:15px;border-radius:6px;}
button {background:#00703c;color:white;padding:15px;width:100%;font-size:18px;border:none;border-radius:5px;margin-top:10px;}
#signature-pad {border:2px solid #ccc;border-radius:4px;background:white;}
.small {background:#666;}
</style>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

</head>

<body>

<h2>Moriarty Group (SuperValu)<br>Accident / Incident Report</h2>

<div class="section">
<label>Store</label>
<input id="store">

<label>Manager</label>
<input id="manager">

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<input type="time" id="time">
</div>

<div class="section">
<label>Exact location in store</label>
<input id="location">

<label>Description of incident</label>
<textarea id="description"></textarea>

<label>Cause of accident</label>
<textarea id="cause"></textarea>
</div>

<div class="section">
<h3>Evidence Photos</h3>

<label>Scene photo</label>
<input type="file" accept="image/*" capture="environment">

<label>Additional photos</label>
<input type="file" accept="image/*" multiple>

<label>Hazard photo</label>
<input type="file" accept="image/*">

<label>Product / shelf photo</label>
<input type="file" accept="image/*">

<label>Injury photo</label>
<input type="file" accept="image/*">

<label>Video clip</label>
<input type="file" accept="video/*">
</div>

<div class="section">
<h3>Witness Statements</h3>

<label>Witness 1 statement</label>
<textarea></textarea>
<input type="file" accept="image/*">

<label>Witness 2 statement</label>
<textarea></textarea>
<input type="file" accept="image/*">

<label>Witness 3 statement</label>
<textarea></textarea>
<input type="file" accept="image/*">

<label>Additional statement photos</label>
<input type="file" accept="image/*" multiple>
</div>

<div class="section">
<h3>Manager Section</h3>

<label>Manager name</label>
<input>

<label>Treatment given</label>
<textarea></textarea>

<label>Manager Signature (sign with finger)</label>
<canvas id="signature-pad" width="300" height="200"></canvas>

<button class="small" onclick="clearSignature()">Clear Signature</button>
</div>

<button onclick="emailReport()">Share / Email Report</button>

<script>

const canvas = document.getElementById('signature-pad');
const signaturePad = new SignaturePad(canvas);

function clearSignature(){
signaturePad.clear();
}

function emailReport() {

let store = document.getElementById("store").value;
let manager = document.getElementById("manager").value;
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;
let location = document.getElementById("location").value;
let description = document.getElementById("description").value;
let cause = document.getElementById("cause").value;

let reportLink =
`https://aarondoyle2026.github.io/Incident-report/?store=${encodeURIComponent(store)}&manager=${encodeURIComponent(manager)}&date=${date}&time=${time}&location=${encodeURIComponent(location)}&description=${encodeURIComponent(description)}&cause=${encodeURIComponent(cause)}`;

let subject = `SuperValu Incident Report - ${store} - ${date}`;

let body =
`A SuperValu incident report has been submitted.

Store: ${store}
Manager: ${manager}
Date: ${date}
Time: ${time}

Open the completed report here:
${reportLink}

The report can be printed or saved as a PDF from a computer.`;

window.location.href =
`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

}

</script>

</body>
</html>
